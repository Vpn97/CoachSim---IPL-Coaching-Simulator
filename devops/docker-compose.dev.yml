################################################################
# Dev overlay
# - No Traefik (it's behind the "proxy" profile in the base file)
# - Frontend nginx is the single host entrypoint; it proxies /api and /ws
#   to the backend container.
# - Backend uses dev profile (debug logs)
# - Mock ingestion provider
################################################################

services:
  postgres:
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"

  backend:
    environment:
      SPRING_PROFILES_ACTIVE: dev
      INGESTION_PROVIDER: mock
      CORS_ALLOWED_ORIGINS: http://localhost,http://localhost:${FRONTEND_HOST_PORT:-80},http://localhost:4200
    ports:
      - "${BACKEND_HOST_PORT:-8080}:8080"

  frontend:
    ports:
      - "${FRONTEND_HOST_PORT:-80}:80"
    # depends_on (service_healthy) is inherited from the base compose file.
