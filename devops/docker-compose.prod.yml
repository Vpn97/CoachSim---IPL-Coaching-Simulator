################################################################
# Prod overlay
# Integrates with the Traefik v2 instance already running on the
# host (separate compose stack). Assumptions about that Traefik:
#   - Listens on entrypoints `web` (:80) and `websecure` (:443)
#   - `web` is redirected to `websecure` (HTTP -> HTTPS)
#   - Lets-Encrypt cert resolver is named `myresolver`
#   - Discovers services via the external network `traefik-network`
#     with `--providers.docker.exposedbydefault=false`
#
# Consequences for this stack:
#   - We do NOT run our own Traefik (the embedded `traefik` service
#     from the base file is profile-gated to "proxy"; leave
#     COMPOSE_PROFILES unset in .env.prod so it never starts).
#   - `backend` and `frontend` join `traefik-network` (in addition
#     to the internal `coachsim_net`) so the external Traefik can
#     reach them.
#   - Every Traefik label is re-declared here so prod doesn't
#     depend on the @file-provider middlewares used by the dev
#     embedded Traefik. All middlewares are inlined as labels.
################################################################

networks:
  # Attach to the external traefik-network created by the host's
  # Traefik stack. Containers on this network are reachable by the
  # external Traefik's Docker provider.
  traefik-network:
    external: true
    name: traefik-network

services:

  postgres:
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 1g
    # Internal network only — DB is never exposed to Traefik.

  backend:
    environment:
      SPRING_PROFILES_ACTIVE: prod
      INGESTION_PROVIDER: ${INGESTION_PROVIDER:-external}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      EXTERNAL_API_BASE_URL: ${EXTERNAL_API_BASE_URL}
      EXTERNAL_API_KEY: ${EXTERNAL_API_KEY}
    networks:
      - coachsim_net      # talks to postgres
      - traefik-network   # reachable by external Traefik
    deploy:
      replicas: ${BACKEND_REPLICAS:-2}
      resources:
        limits:
          memory: 1g
    # No host port mapping — only Traefik fronts us.
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-network"

      # ---- REST API router -------------------------------------------------
      - "traefik.http.routers.coachsim-api.rule=Host(`${PUBLIC_HOST}`) && (PathPrefix(`/api`) || PathPrefix(`/actuator`))"
      - "traefik.http.routers.coachsim-api.entrypoints=websecure"
      - "traefik.http.routers.coachsim-api.tls=true"
      - "traefik.http.routers.coachsim-api.tls.certresolver=myresolver"
      - "traefik.http.routers.coachsim-api.service=coachsim-api"
      - "traefik.http.routers.coachsim-api.middlewares=coachsim-headers,coachsim-ratelimit,coachsim-compress"
      - "traefik.http.services.coachsim-api.loadbalancer.server.port=8080"

      # ---- WebSocket router (sticky session) -------------------------------
      - "traefik.http.routers.coachsim-ws.rule=Host(`${PUBLIC_HOST}`) && PathPrefix(`/ws`)"
      - "traefik.http.routers.coachsim-ws.entrypoints=websecure"
      - "traefik.http.routers.coachsim-ws.tls=true"
      - "traefik.http.routers.coachsim-ws.tls.certresolver=myresolver"
      - "traefik.http.routers.coachsim-ws.service=coachsim-ws"
      - "traefik.http.services.coachsim-ws.loadbalancer.server.port=8080"
      - "traefik.http.services.coachsim-ws.loadbalancer.sticky.cookie=true"
      - "traefik.http.services.coachsim-ws.loadbalancer.sticky.cookie.name=coachsim_ws_sticky"
      - "traefik.http.services.coachsim-ws.loadbalancer.sticky.cookie.httponly=true"
      - "traefik.http.services.coachsim-ws.loadbalancer.sticky.cookie.secure=true"

      # ---- Inline middlewares (no @file provider on the host Traefik) ----
      - "traefik.http.middlewares.coachsim-headers.headers.framedeny=true"
      - "traefik.http.middlewares.coachsim-headers.headers.contenttypenosniff=true"
      - "traefik.http.middlewares.coachsim-headers.headers.browserxssfilter=true"
      - "traefik.http.middlewares.coachsim-headers.headers.referrerpolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.coachsim-headers.headers.stsseconds=31536000"
      - "traefik.http.middlewares.coachsim-headers.headers.stsincludesubdomains=true"
      - "traefik.http.middlewares.coachsim-headers.headers.stspreload=true"
      - "traefik.http.middlewares.coachsim-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.coachsim-ratelimit.ratelimit.burst=50"
      - "traefik.http.middlewares.coachsim-ratelimit.ratelimit.period=1s"
      - "traefik.http.middlewares.coachsim-compress.compress=true"

  frontend:
    networks:
      - coachsim_net      # nginx proxies /api & /ws to backend internally
      - traefik-network   # reachable by external Traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-network"

      # Catch-all for the public host — lowest priority so the API/WS
      # routers above always win for /api, /actuator and /ws.
      - "traefik.http.routers.coachsim-web.rule=Host(`${PUBLIC_HOST}`)"
      - "traefik.http.routers.coachsim-web.entrypoints=websecure"
      - "traefik.http.routers.coachsim-web.tls=true"
      - "traefik.http.routers.coachsim-web.tls.certresolver=myresolver"
      - "traefik.http.routers.coachsim-web.priority=1"
      - "traefik.http.routers.coachsim-web.service=coachsim-web"
      - "traefik.http.routers.coachsim-web.middlewares=coachsim-headers,coachsim-compress"
      - "traefik.http.services.coachsim-web.loadbalancer.server.port=80"

  # Embedded Traefik from the base file stays profile-gated under
  # "proxy". As long as .env.prod does NOT set COMPOSE_PROFILES=proxy
  # it never starts, leaving the host's external Traefik in charge.

  pg-backup:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
    volumes:
      - pg_backups:/backups
      - ./backups/pg-dump.sh:/usr/local/bin/pg-dump.sh:ro
    entrypoint: ["sh", "-c", "while true; do /usr/local/bin/pg-dump.sh; sleep 86400; done"]
    networks:
      - coachsim_net
    restart: unless-stopped
