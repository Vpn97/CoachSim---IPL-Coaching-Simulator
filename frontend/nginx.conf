################################################################
# Frontend nginx — serves the Angular SPA and proxies API/WS traffic
# to the backend container.
#
# Why proxy here even in prod?
#   - In dev (no Traefik), this nginx is the single entrypoint on the host,
#     so /api and /ws must reach the backend somehow.
#   - In prod (with Traefik), Traefik's router for /api and /ws has higher
#     priority than the frontend catch-all, so these proxy blocks are dead
#     code in prod — harmless and keeps a single nginx config across envs.
################################################################

upstream coachsim_backend {
    server backend:8080;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- REST API ---------------------------------------------------------
    location /api/ {
        proxy_pass         http://coachsim_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /actuator/ {
        proxy_pass         http://coachsim_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- WebSocket (STOMP) ------------------------------------------------
    location /ws {
        proxy_pass         http://coachsim_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- SPA --------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
