spring:
  application:
    name: coachsim-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/coachsim}
    username: ${DB_USER:coachsim}
    password: ${DB_PASSWORD:coachsim}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        cache:
          use_second_level_cache: true
          use_query_cache: true
          region:
            factory_class: org.hibernate.cache.jcache.JCacheRegionFactory
        javax:
          cache:
            provider: org.ehcache.jsr107.EhcacheCachingProvider
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  forward-headers-strategy: framework
  compression:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

app:
  jwt:
    secret: ${JWT_SECRET:change-me-please-change-me-please-change-me-please}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost}
  ingestion:
    provider: ${INGESTION_PROVIDER:mock}
    # 5s for mock (snappy local demos); 60s default for external so we don't
    # eat the CricAPI free-tier's 100-req/day budget.
    poll-interval-ms: ${INGESTION_POLL_INTERVAL_MS:5000}
  decision:
    window-seconds: 15
  external-api:
    base-url: ${EXTERNAL_API_BASE_URL:}
    api-key: ${EXTERNAL_API_KEY:}

logging:
  level:
    root: INFO
    com.coachsim: INFO
    org.springframework.security: INFO
